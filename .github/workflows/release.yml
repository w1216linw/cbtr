name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build EXE
        run: uv run pyinstaller cbt_report.spec --clean

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: CBT Report ${{ github.ref_name }}
          files: dist/cbt_report.exe
